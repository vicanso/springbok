name: "publish"
on:
  push:
    # tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
    branches: [release]

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" 
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04" # for Tauri v1 you could replace this with ubuntu-20.04.
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: ilammy/setup-nasm@v1
      - uses: actions/checkout@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
        # webkitgtk 4.0 is for Tauri v1 - webkitgtk 4.1 is for Tauri v2.
        # You can remove the one that doesn't apply to your app to speed up the workflow a bit.

      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-build-${{ matrix.platform }}
          workspaces: "src-tauri -> src-tauri/target"
      
      - name: install frontend dependencies
        run: yarn install # change this to npm, pnpm or bun depending on which one you use.

      - name: Check system CA certificates (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          echo "=== Searching all keychains for Apple Root CA G2 ==="
          security find-certificate -a -c "Apple Root CA - G2" /Library/Keychains/System.keychain 2>/dev/null \
            && echo "FOUND: Apple Root CA - G2" \
            || echo "NOT FOUND: Apple Root CA - G2"

          echo "=== Searching all keychains for Developer ID G2 intermediate ==="
          security find-certificate -a -c "Developer ID Certification Authority G2" /Library/Keychains/System.keychain 2>/dev/null \
            && echo "FOUND: Developer ID Certification Authority G2" \
            || echo "NOT FOUND: Developer ID Certification Authority G2"

          echo "=== All CA certs in System.keychain (grep Apple) ==="
          security find-certificate -a /Library/Keychains/System.keychain 2>/dev/null \
            | grep "alis" | grep -i apple || true

      - name: Import Apple certificate (macOS only)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # 解码 P12，先用 openssl 检查证书基本信息（签发者、有效期）
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          echo "=== Certificate info from P12 ==="
          openssl pkcs12 -in certificate.p12 -passin pass:"$APPLE_CERTIFICATE_PASSWORD" \
            -nokeys -clcerts 2>/dev/null \
            | openssl x509 -noout -subject -issuer -dates 2>/dev/null \
            || echo "WARNING: could not parse certificate from P12"

          # 创建并解锁钥匙串（使用空密码，与 set-key-partition-list 保持一致）
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # 导入根证书并确认
          security import asset/AppleRootCAG2.cer -k build.keychain -t cert
          echo "=== After importing Apple Root CA G2 ==="
          security find-certificate -a -c "Apple Root CA" build.keychain 2>/dev/null \
            | grep alis || echo "NOT FOUND in build.keychain"

          # 导入 G2 中间证书并确认
          security import asset/DeveloperIDG2CA.cer -k build.keychain -t cert
          echo "=== After importing Developer ID G2 CA ==="
          security find-certificate -a -c "Developer ID Certification Authority" build.keychain 2>/dev/null \
            | grep alis || echo "NOT FOUND in build.keychain"

          # 导入 P12 并确认（-v 输出含义：不含 -v 时显示所有 identity，含 -v 只显示链完整的）
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign
          echo "=== After importing P12: all identities (chain not required) ==="
          security find-identity -p codesigning build.keychain
          echo "=== After importing P12: valid identities (chain required) ==="
          security find-identity -v -p codesigning build.keychain

          # 加入搜索列表并设置分区（空密码与 create-keychain 一致）
          CURRENT_KEYCHAINS=$(security list-keychains -d user | xargs)
          security list-keychains -d user -s build.keychain $CURRENT_KEYCHAINS
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

          echo "=== Final: valid identities across all keychains ==="
          security find-identity -v -p codesigning

          # 真实验证：对已有签名的文件用 --force 覆盖签名
          echo "=== codesign test ==="
          cp /bin/ls /tmp/cs_test
          codesign --force -s "Developer ID Application: tree xie (4G5PXJXZTU)" /tmp/cs_test \
            && echo "CODESIGN TEST: SUCCESS" \
            || { echo "CODESIGN TEST: FAILED"; exit 1; }

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: tree xie (4G5PXJXZTU)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: springbok-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "Springbok v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
