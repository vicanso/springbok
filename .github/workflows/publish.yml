name: "publish"
on:
  push:
    # tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
    branches: [release,main]

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" 
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04" # for Tauri v1 you could replace this with ubuntu-20.04.
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: ilammy/setup-nasm@v1
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
        # webkitgtk 4.0 is for Tauri v1 - webkitgtk 4.1 is for Tauri v2.
        # You can remove the one that doesn't apply to your app to speed up the workflow a bit.

      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-build-${{ matrix.platform }}
      
      - name: install frontend dependencies
        run: yarn install # change this to npm, pnpm or bun depending on which one you use.

      - name: Check system CA certificates (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          echo "=== Searching all keychains for Apple Root CA G2 ==="
          security find-certificate -a -c "Apple Root CA - G2" /Library/Keychains/System.keychain 2>/dev/null \
            && echo "FOUND: Apple Root CA - G2" \
            || echo "NOT FOUND: Apple Root CA - G2"

          echo "=== Searching all keychains for Developer ID G2 intermediate ==="
          security find-certificate -a -c "Developer ID Certification Authority" /Library/Keychains/System.keychain 2>/dev/null \
            | grep -E "(alis|labl)" \
            || echo "NOT FOUND: Developer ID Certification Authority"

          echo "=== All CA certs in System.keychain (grep Apple) ==="
          security find-certificate -a /Library/Keychains/System.keychain 2>/dev/null \
            | grep "alis" | grep -i apple || true

      - name: Import Apple certificate (macOS only)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 解码 P12
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12

          # 创建并解锁钥匙串
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # 导入你的 P12（中间/根证书在 Runner 系统钥匙串中已有，无需单独导入）
          # 注意：add-trusted-cert -d 需要交互式授权，会在 CI 中永久挂起，不可使用
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign

          # 关键：将钥匙串加入搜索列表并设置分区列表
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed 's/\"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # 验证：不带 keychain 参数，在全部搜索列表中检查（应显示 ≥1 valid identity）
          echo "Checking identities..."
          security find-identity -v -p codesigning
          VALID=$(security find-identity -v -p codesigning | grep -c "valid identity" || true)
          if [ "$VALID" -eq 0 ]; then
            echo "ERROR: no valid codesigning identity found after import"
            exit 1
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: tree xie (4G5PXJXZTU)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: springbok-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "Springbok v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
